# App Engine Standard 

runtime: python312


instance_class: F4_1G

# Disable oneDNN to avoid SIGFPE (signal 8) crashes on App Engine CPU and also potentially reduce higher log storage costs
env_variables:
  TF_ENABLE_ONEDNN_OPTS: "0"
  TF_CPP_MIN_LOG_LEVEL: "2"

inbound_services:
  - warmup

automatic_scaling:
  max_instances: 5
  min_instances: 0
  target_cpu_utilization: 0.65

# FastAPI + Uvicorn entrypoint (App Engine will setthe PORT)
entrypoint: uvicorn app.api:app --host 0.0.0.0 --port $PORT

